<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <section class="main">

        <div class="container">
            <div class="task">
                <div class="task__left">
                </div>
                <div class="task__right">
                    <div class="allformsinright">
                        <div class="registration__form">
                            <h1>Get iintoo it today</h1>
                            <p>There is no charge or obligation upon registration</p>

                            <div class="buttons">
                                <div class="button__fb">
                                    <img src="img/facebook.svg" alt="">
                                    <a href="#">Register with Facebook</a>
                                </div>
                                <div class="button__in">
                                    <img src="img/linkedin.svg" alt="">
                                    <a href="#">Register with LinkedIn</a>
                                </div>
                            </div>

                            <p class="or">OR</p>

                            <div class="inputsinformsforregistration">

                                <form action="" class="formsforregistration">

                                    <div class="input__box">
                                        <label class="form__label">Email</label>
                                        <input type="email" class="email">
                                    </div>

                                    <div class="input__box">
                                        <label class="form__label">Phone</label>
                                        <input type="phone" class="phone">
                                    </div>

                                </form>

                            </div>

                        </div>

                        <div class="investor__form">
                            <h1>What type of investor are you?</h1>
                            <p>Select the type of investor you are below.</p>
                            <div class="buttons__radio">
                                <div class="radio">
                                        <input type="radio" class="typeofinvestor" name="investortype" id="1">
                                        <label for="1">Individual</label>
                                </div>
                                <div class="radio">
                                        <input type="radio" class="typeofinvestor" name="investortype" id="2">
                                        <label for="2">Business</label>
                                </div>
                                <div class="radio">
                                        <input type="radio" class="typeofinvestor" name="investortype" id="3">
                                        <label for="3">IRA</label>
                                </div>
                                <div class="radio">
                                        <input type="radio" class="typeofinvestor" name="investortype" id="4">
                                        <label for="4">Trust</label>
                                </div>
                            </div>

                            <div class="description">
                                <textarea name="description" id="" cols="30" rows="5" placeholder="I am a natural person investing on my own behalf as a sole owner, joint tenant, or tenant in common."></textarea>
                            </div>

                            <div class="finalform">
                                <label>
                                    <input type="checkbox" name="" id="">
                                    I agree to the terms and receiving notifications from iintoo
                                    <a href="#">View full terms</a>
                                </label>
                                <div class="createaccount">
                                    <button>Create Account</button>
                                </div>
                            </div>
                        </div>

                    </div>



                </div>
            </div>
        </div>

    </section>
</body>
</html>
